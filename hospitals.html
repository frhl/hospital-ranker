  subdomains: 'abcd',
  maxZoom: 19,
}).addTo(map);

  regionCounts[h[3]] = (regionCounts[h[3]] || 0) + 1;
});

// Build legend

  const color = REGION_COLORS[region];
  const count = regionCounts[region] || 0;
  legendHTML += `<div class="legend-item" data-region="${region}">
    <div class="legend-dot" style="background:${color}"></div>
    <span class="legend-label">${region}</span>
    <span class="legend-count">${count}</span>
  </div>`;
});
legend.innerHTML = legendHTML;

// Add markers

  const color = REGION_COLORS[region] || '#888';
  const marker = L.circleMarker([lat, lng], {
    radius: 7,
    color: '#fff',
    weight: 2,
    fillColor: color,
    fillOpacity: 0.9,
  }).addTo(map);

  marker.bindTooltip(name, {
    permanent: false,
    direction: 'top',
    offset: [0, -10],
    className: 'hospital-label',
  });

  marker.bindPopup(`
    <strong>${name}</strong><br>
    <div class="region-badge" style="background:${color}">${region}</div><br>
    <span style="font-size:11px;color:#666">${lat.toFixed(4)}, ${lng.toFixed(4)}</span>

});
